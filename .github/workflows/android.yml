name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # 开启手动Run workflow按钮

jobs:
  build:
    runs-on: ubuntu-latest
    environment: android
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks

    - name: Build signed release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease \
          -PstoreFile=app/keystore.jks \
          -PstorePassword=$KEYSTORE_PASSWORD \
          -PkeyAlias=$KEY_ALIAS \
          -PkeyPassword=$KEY_PASSWORD

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: QuitSmoke-Release-Signed-APK
        path: app/build/outputs/apk/release/app-release.apk
